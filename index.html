<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>JOKER — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #04060c;
    --bg-1: #080d1c;
    --bg-2: #0b1226;
    --cyan: #34e0ff;
    --cyan-dim: rgba(52, 224, 255, 0.55);
    --purple: #b26bff;
    --green: #58ff9b;
    --text: #d6e6f2;
    --text-dim: #7d93a8;
    --bubble-user: rgba(52, 224, 255, 0.10);
    --bubble-user-border: rgba(52, 224, 255, 0.35);
    --bubble-joker: rgba(178, 107, 255, 0.09);
    --bubble-joker-border: rgba(178, 107, 255, 0.32);
    --font-tech: 'Rajdhani', 'IBM Plex Sans KR', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans KR', 'Rajdhani', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    font-family: var(--font-body);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(20, 40, 90, 0.45), transparent 70%),
      radial-gradient(ellipse 70% 50% at 50% 105%, rgba(60, 20, 90, 0.25), transparent 70%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    z-index: 0;
    pointer-events: none;
  }

  /* HUD grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(52, 224, 255, 0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52, 224, 255, 0.022) 1px, transparent 1px);
    background-size: 44px 44px;
    z-index: 1;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 100%);
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 3;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── header ─────────────────────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 4px 6px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-family: var(--font-tech);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.42em;
    color: var(--cyan);
    text-shadow: 0 0 18px rgba(52, 224, 255, 0.55);
  }

  .brand .ver {
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: dotPulse 2.4s ease-in-out infinite;
  }

  .status.thinking .dot {
    background: var(--purple);
    box-shadow: 0 0 10px var(--purple);
    animation: dotPulse 0.5s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.75); }
  }

  /* ── brain stage ────────────────────── */
  .stage {
    flex: 0 0 auto;
    position: relative;
    height: clamp(210px, 37dvh, 380px);
  }

  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .stage .caption {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0.75;
    z-index: 2;
  }

  .stage .caption .sep { color: var(--cyan-dim); margin: 0 8px; }

  /* ── chat ───────────────────────────── */
  .chat {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 14px 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(52, 224, 255, 0.25) transparent;
    mask-image: linear-gradient(to bottom, transparent 0, black 18px);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 18px);
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb {
    background: rgba(52, 224, 255, 0.25);
    border-radius: 2px;
  }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    backdrop-filter: blur(6px);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    border: 1px solid var(--bubble-user-border);
    border-bottom-right-radius: 4px;
    box-shadow: 0 0 24px rgba(52, 224, 255, 0.07);
  }

  .msg.joker {
    align-self: flex-start;
    background: var(--bubble-joker);
    border: 1px solid var(--bubble-joker-border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 0 24px rgba(178, 107, 255, 0.07);
  }

  .msg .who {
    display: block;
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.3em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .msg.user .who { color: var(--cyan-dim); text-align: right; }
  .msg.joker .who { color: var(--purple); }

  .msg.joker .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    margin-left: 2px;
    vertical-align: -0.15em;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .msg.joker.typing-dots .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-right: 5px;
    border-radius: 50%;
    background: var(--purple);
    box-shadow: 0 0 8px var(--purple);
    animation: bounce 1.1s ease-in-out infinite;
  }
  .msg.joker.typing-dots .dots span:nth-child(2) { animation-delay: 0.15s; }
  .msg.joker.typing-dots .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── input ──────────────────────────── */
  .composer {
    flex: 0 0 auto;
    padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
  }

  .composer .box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10, 18, 36, 0.72);
    border: 1px solid rgba(52, 224, 255, 0.22);
    border-radius: 16px;
    padding: 6px 6px 6px 18px;
    backdrop-filter: blur(10px);
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .composer .box:focus-within {
    border-color: rgba(52, 224, 255, 0.55);
    box-shadow: 0 0 28px rgba(52, 224, 255, 0.12);
  }

  .composer input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 10px 0;
  }

  .composer input::placeholder { color: var(--text-dim); }

  .composer button {
    flex: 0 0 auto;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, rgba(52, 224, 255, 0.9), rgba(178, 107, 255, 0.85));
    color: #04121c;
    transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
    box-shadow: 0 0 18px rgba(52, 224, 255, 0.25);
  }

  .composer button:hover { filter: brightness(1.12); box-shadow: 0 0 26px rgba(52, 224, 255, 0.4); }
  .composer button:active { transform: scale(0.92); }
  .composer button:disabled { filter: grayscale(0.6) brightness(0.6); cursor: default; box-shadow: none; }

  .composer button svg { width: 20px; height: 20px; }

  @media (max-width: 560px) {
    .app { padding: 0 12px; }
    .brand h1 { font-size: 18px; letter-spacing: 0.32em; }
    .status { font-size: 9px; letter-spacing: 0.18em; }
    .stage { height: clamp(170px, 31dvh, 260px); }
    .stage .caption { font-size: 8px; letter-spacing: 0.28em; }
    .msg { max-width: 88%; font-size: 14px; }
  }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="app">
  <header>
    <div class="brand">
      <h1>JOKER</h1>
      <span class="ver">v3.0 · NEURAL LINK</span>
    </div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="statusText">Online</span>
    </div>
  </header>

  <div class="stage" id="stage">
    <canvas id="brain3d"></canvas>
    <canvas id="brain2d" hidden></canvas>
    <div class="caption">Cortex Activity<span class="sep">|</span><span id="capState">Idle</span><span class="sep">|</span><span id="capMode">GPU</span></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="composer">
    <div class="box">
      <input id="input" type="text" placeholder="조커에게 말을 걸어보세요…" autocomplete="off" />
      <button id="send" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13" /><path d="M22 2l-7 20-4-9-9-4 20-7z" />
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/gsap.min.js"></script>
<script src="js/particles.js"></script>
<script src="js/brain2d.js"></script>
<script src="js/brain3d.js"></script>
<script src="js/chat.js"></script>
<script src="js/main.js"></script>
</body>
</html>
