<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>JOKER — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #04060c;
    --bg-1: #080d1c;
    --bg-2: #0b1226;
    --cyan: #34e0ff;
    --cyan-dim: rgba(52, 224, 255, 0.55);
    --purple: #b26bff;
    --green: #58ff9b;
    --text: #d6e6f2;
    --text-dim: #7d93a8;
    --bubble-user: rgba(52, 224, 255, 0.10);
    --bubble-user-border: rgba(52, 224, 255, 0.35);
    --bubble-joker: rgba(178, 107, 255, 0.09);
    --bubble-joker-border: rgba(178, 107, 255, 0.32);
    --font-tech: 'Rajdhani', 'IBM Plex Sans KR', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans KR', 'Rajdhani', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    font-family: var(--font-body);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(20, 40, 90, 0.45), transparent 70%),
      radial-gradient(ellipse 70% 50% at 50% 105%, rgba(60, 20, 90, 0.25), transparent 70%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    z-index: 0;
    pointer-events: none;
  }

  /* HUD grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(52, 224, 255, 0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52, 224, 255, 0.022) 1px, transparent 1px);
    background-size: 44px 44px;
    z-index: 1;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 100%);
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 3;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── header ─────────────────────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 4px 6px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-family: var(--font-tech);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.42em;
    color: var(--cyan);
    text-shadow: 0 0 18px rgba(52, 224, 255, 0.55);
  }

  .brand .ver {
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: dotPulse 2.4s ease-in-out infinite;
  }

  .status.thinking .dot {
    background: var(--purple);
    box-shadow: 0 0 10px var(--purple);
    animation: dotPulse 0.5s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.75); }
  }

  /* ── brain stage ────────────────────── */
  .stage {
    flex: 0 0 auto;
    position: relative;
    height: clamp(210px, 37dvh, 380px);
  }

  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .stage .caption {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0.75;
    z-index: 2;
  }

  .stage .caption .sep { color: var(--cyan-dim); margin: 0 8px; }

  /* active-department HUD chip */
  .division {
    position: absolute;
    top: 6px;
    left: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.6s, transform 0.6s;
    z-index: 2;
    pointer-events: none;
  }

  .division.active { opacity: 1; transform: translateY(0); }

  .division .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
    animation: dotPulse 1.6s ease-in-out infinite;
  }

  .division .label { color: var(--text-dim); }
  .division .name { color: currentColor; font-weight: 600; letter-spacing: 0.12em; }

  /* ── chat ───────────────────────────── */
  .chat {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 14px 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(52, 224, 255, 0.25) transparent;
    mask-image: linear-gradient(to bottom, transparent 0, black 18px);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 18px);
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb {
    background: rgba(52, 224, 255, 0.25);
    border-radius: 2px;
  }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    backdrop-filter: blur(6px);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    border: 1px solid var(--bubble-user-border);
    border-bottom-right-radius: 4px;
    box-shadow: 0 0 24px rgba(52, 224, 255, 0.07);
  }

  .msg.joker {
    align-self: flex-start;
    background: var(--bubble-joker);
    border: 1px solid var(--bubble-joker-border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 0 24px rgba(178, 107, 255, 0.07);
  }

  .msg .who {
    display: block;
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.3em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .msg.user .who { color: var(--cyan-dim); text-align: right; }
  .msg.joker .who { color: var(--purple); }

  .msg.joker .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    margin-left: 2px;
    vertical-align: -0.15em;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .msg.joker.typing-dots .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-right: 5px;
    border-radius: 50%;
    background: var(--purple);
    box-shadow: 0 0 8px var(--purple);
    animation: bounce 1.1s ease-in-out infinite;
  }
  .msg.joker.typing-dots .dots span:nth-child(2) { animation-delay: 0.15s; }
  .msg.joker.typing-dots .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── input ──────────────────────────── */
  .composer {
    flex: 0 0 auto;
    padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
  }

  .composer .box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10, 18, 36, 0.72);
    border: 1px solid rgba(52, 224, 255, 0.22);
    border-radius: 16px;
    padding: 6px 6px 6px 18px;
    backdrop-filter: blur(10px);
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .composer .box:focus-within {
    border-color: rgba(52, 224, 255, 0.55);
    box-shadow: 0 0 28px rgba(52, 224, 255, 0.12);
  }

  .composer input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 10px 0;
  }

  .composer input::placeholder { color: var(--text-dim); }

  .composer button {
    flex: 0 0 auto;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, rgba(52, 224, 255, 0.9), rgba(178, 107, 255, 0.85));
    color: #04121c;
    transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
    box-shadow: 0 0 18px rgba(52, 224, 255, 0.25);
  }

  .composer button:hover { filter: brightness(1.12); box-shadow: 0 0 26px rgba(52, 224, 255, 0.4); }
  .composer button:active { transform: scale(0.92); }
  .composer button:disabled { filter: grayscale(0.6) brightness(0.6); cursor: default; box-shadow: none; }

  .composer button svg { width: 20px; height: 20px; }

  .composer .mic {
    background: none;
    border: 1px solid rgba(52, 224, 255, 0.22);
    color: var(--text-dim);
    box-shadow: none;
  }
  .composer .mic:hover { color: var(--cyan); border-color: rgba(52, 224, 255, 0.5); box-shadow: none; }
  .composer .mic svg { width: 18px; height: 18px; }
  .composer .mic.listening {
    color: #ff5c5c;
    border-color: rgba(255, 92, 92, 0.6);
    animation: micPulse 1.1s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 92, 92, 0.35); }
    50% { box-shadow: 0 0 0 8px rgba(255, 92, 92, 0); }
  }

  .gear.active { color: var(--green); border-color: rgba(88, 255, 155, 0.5); }

  /* image attach: preview chip above the input + image inside a bubble */
  .composer .attach-preview[hidden] { display: none; }
  .composer .attach-preview {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 6px 10px;
    background: rgba(10, 18, 36, 0.72);
    border: 1px solid rgba(88, 255, 155, 0.35);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    animation: msgIn 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .composer .attach-preview img {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid rgba(52, 224, 255, 0.25);
    background: rgba(52, 224, 255, 0.08);
    overflow: hidden;
    /* if the thumbnail ever fails to render, hide the alt text instead of
       spilling broken characters into the 44px box */
    font-size: 0;
    color: transparent;
  }
  .composer .attach-preview .attach-label {
    flex: 1;
    font-family: var(--font-body);
    font-size: 12.5px;
    letter-spacing: 0;
    color: var(--text);
  }
  .composer .attach-preview .attach-label b {
    font-weight: 500;
    color: var(--green);
  }
  .composer .attach-preview button {
    width: 28px;
    height: 28px;
    background: none;
    border: none;
    box-shadow: none;
    color: var(--text-dim);
    font-size: 20px;
    line-height: 1;
  }
  .composer .attach-preview button:hover { color: #ff5c5c; filter: none; box-shadow: none; }

  .msg img.attach {
    display: block;
    max-width: 100%;
    max-height: 260px;
    border-radius: 10px;
    border: 1px solid rgba(52, 224, 255, 0.25);
    margin: 4px 0 6px;
    overflow: hidden;
    font-size: 0;
    color: transparent;
  }

  .composer.dragging .box {
    border-color: rgba(88, 255, 155, 0.7);
    box-shadow: 0 0 28px rgba(88, 255, 155, 0.18);
  }

  /* ── settings (company memory) panel ── */
  .head-right { display: flex; align-items: center; gap: 14px; }

  .gear {
    background: none;
    border: 1px solid rgba(52, 224, 255, 0.22);
    border-radius: 10px;
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.4s;
  }
  .gear:hover { color: var(--cyan); border-color: rgba(52, 224, 255, 0.5); transform: rotate(60deg); }
  .gear svg { width: 17px; height: 17px; }

  .panel-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2, 4, 10, 0.55);
    backdrop-filter: blur(3px);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 8;
  }
  .panel-backdrop.open { opacity: 1; }

  .settings {
    position: fixed;
    top: 0;
    right: 0;
    height: 100dvh;
    width: min(420px, 100vw);
    background: rgba(8, 13, 28, 0.96);
    border-left: 1px solid rgba(52, 224, 255, 0.25);
    box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
    z-index: 9;
    display: flex;
    flex-direction: column;
    padding: 20px 22px calc(20px + env(safe-area-inset-bottom));
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .settings.open { transform: translateX(0); }

  .settings-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .settings-head h2 {
    font-family: var(--font-tech);
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 14px rgba(52, 224, 255, 0.45);
  }
  .settings-head button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  .settings-head button:hover { color: var(--text); }

  .settings-desc {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .settings-fields {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(52, 224, 255, 0.25) transparent;
  }

  .settings .field label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text);
    margin-bottom: 5px;
  }
  .settings .field label .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
  }
  .settings .field textarea {
    width: 100%;
    resize: vertical;
    min-height: 44px;
    background: rgba(10, 18, 36, 0.7);
    border: 1px solid rgba(52, 224, 255, 0.18);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.55;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  .settings .field textarea:focus { border-color: rgba(52, 224, 255, 0.5); }
  .settings .field textarea::placeholder { color: rgba(125, 147, 168, 0.55); }

  .settings-save {
    margin-top: 14px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: var(--font-tech);
    font-size: 14px;
    letter-spacing: 0.25em;
    color: #04121c;
    background: linear-gradient(135deg, rgba(52, 224, 255, 0.9), rgba(178, 107, 255, 0.85));
    box-shadow: 0 0 18px rgba(52, 224, 255, 0.25);
    transition: filter 0.2s;
  }
  .settings-save:hover { filter: brightness(1.12); }
  .settings-save.saved { background: linear-gradient(135deg, rgba(88, 255, 155, 0.9), rgba(52, 224, 255, 0.85)); }

  .settings-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .settings-tabs button {
    flex: 1;
    padding: 8px 0;
    background: rgba(10, 18, 36, 0.7);
    border: 1px solid rgba(52, 224, 255, 0.18);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .settings-tabs button.active {
    color: var(--cyan);
    border-color: rgba(52, 224, 255, 0.5);
    background: rgba(52, 224, 255, 0.08);
    text-shadow: 0 0 10px rgba(52, 224, 255, 0.45);
  }

  .settings-pane {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .settings-pane[hidden] { display: none; }

  .skill-card {
    border: 1px solid rgba(178, 107, 255, 0.25);
    border-radius: 12px;
    background: rgba(16, 11, 32, 0.55);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
  }
  .skill-card .skill-row {
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .skill-card input,
  .skill-card textarea {
    width: 100%;
    background: rgba(10, 18, 36, 0.7);
    border: 1px solid rgba(178, 107, 255, 0.2);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.55;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .skill-card textarea { resize: vertical; min-height: 56px; }
  .skill-card input:focus,
  .skill-card textarea:focus { border-color: rgba(178, 107, 255, 0.55); }
  .skill-card input::placeholder,
  .skill-card textarea::placeholder { color: rgba(125, 147, 168, 0.55); }
  .skill-card .skill-del {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
    flex-shrink: 0;
  }
  .skill-card .skill-del:hover { color: #ff5c5c; }

  .skill-add {
    margin-top: 10px;
    padding: 10px;
    border: 1px dashed rgba(178, 107, 255, 0.4);
    border-radius: 12px;
    background: none;
    color: #b26bff;
    font-family: var(--font-tech);
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .skill-add:hover { border-color: rgba(178, 107, 255, 0.8); background: rgba(178, 107, 255, 0.08); }

  /* 일정/리마인더 confirmation card */
  .action-chip {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(88, 255, 155, 0.35);
    background: rgba(88, 255, 155, 0.07);
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    backdrop-filter: blur(6px);
  }
  .action-chip .info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .action-chip .kind {
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--green);
  }
  .action-chip b {
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    word-break: break-word;
  }
  .action-chip .when { color: var(--text-dim); font-size: 12.5px; }
  .action-chip a {
    flex-shrink: 0;
    color: var(--cyan);
    border: 1px solid rgba(52, 224, 255, 0.3);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12px;
    text-decoration: none;
    white-space: nowrap;
    transition: border-color 0.2s, background 0.2s;
  }
  .action-chip a:hover { border-color: rgba(52, 224, 255, 0.6); background: rgba(52, 224, 255, 0.08); }

  /* copy-reply button at the bottom of a Joker bubble */
  .msg .copy-btn {
    display: flex;
    align-items: center;
    width: max-content;
    gap: 5px;
    margin-top: 8px;
    padding: 4px 9px;
    background: none;
    border: 1px solid rgba(52, 224, 255, 0.22);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .msg .copy-btn:hover { color: var(--cyan); border-color: rgba(52, 224, 255, 0.5); }
  .msg .copy-btn.copied { color: var(--green); border-color: rgba(88, 255, 155, 0.5); }
  .msg .copy-btn svg { width: 12px; height: 12px; }

  .msg .skill-badge {
    display: block;
    margin-top: 5px;
    font-family: var(--font-tech);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #b26bff;
    text-shadow: 0 0 8px rgba(178, 107, 255, 0.45);
  }

  @media (max-width: 560px) {
    .app { padding: 0 12px; }
    .brand h1 { font-size: 18px; letter-spacing: 0.32em; }
    .status { font-size: 9px; letter-spacing: 0.18em; }
    .stage { height: clamp(170px, 31dvh, 260px); }
    .stage .caption { font-size: 8px; letter-spacing: 0.28em; }
    .msg { max-width: 88%; font-size: 14px; }
  }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="app">
  <header>
    <div class="brand">
      <h1>JOKER</h1>
      <span class="ver">v3.0 · NEURAL LINK</span>
    </div>
    <div class="head-right">
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="statusText">Online</span>
      </div>
      <button class="gear" id="ttsBtn" aria-label="음성 답변 켜기/끄기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
      </button>
      <button class="gear" id="settingsBtn" aria-label="컴퍼니 메모리·스킬 설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="stage" id="stage">
    <canvas id="brain3d"></canvas>
    <canvas id="brain2d" hidden></canvas>
    <div class="division" id="division"><span class="dot"></span><span class="label">DIVISION</span><span class="name" id="divisionName"></span></div>
    <div class="caption">Cortex Activity<span class="sep">|</span><span id="capState">Idle</span><span class="sep">|</span><span id="capMode">GPU</span></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="composer" id="composer">
    <div class="attach-preview" id="attachPreview" hidden>
      <img id="attachThumb" alt="" />
      <span class="attach-label"><b>사진 1장 준비됨</b> · 보내면 조커가 바로 확인해요</span>
      <button id="attachRemove" aria-label="첨부 취소">×</button>
    </div>
    <div class="box">
      <input id="input" type="text" placeholder="조커에게 말을 걸어보세요…" autocomplete="off" />
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="attachBtn" class="mic" aria-label="이미지 첨부">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
      </button>
      <button id="micBtn" class="mic" aria-label="음성으로 말하기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <button id="send" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13" /><path d="M22 2l-7 20-4-9-9-4 20-7z" />
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="panel-backdrop" id="panelBackdrop" hidden></div>
<aside class="settings" id="settingsPanel" hidden>
  <div class="settings-head">
    <h2 id="settingsTitle">COMPANY MEMORY</h2>
    <button id="settingsClose" aria-label="닫기">×</button>
  </div>
  <div class="settings-tabs" id="settingsTabs">
    <button class="active" data-tab="memory">MEMORY</button>
    <button data-tab="skills">SKILLS</button>
  </div>
  <div class="settings-pane" id="paneMemory">
    <p class="settings-desc">조커가 항상 기억할 회사·부서 정보를 적어두세요. 대화할 때 자동으로 참고합니다. 내용은 이 브라우저에 저장됩니다.</p>
    <div class="settings-fields" id="settingsFields">
      <div class="field">
        <label><span class="dot" style="color:#34e0ff"></span>회사 공통</label>
        <textarea id="know-company" rows="3" maxlength="2000" placeholder="회사 소개, 상준님 호칭, 전반적인 상황, 조커가 늘 알고 있어야 할 것…"></textarea>
      </div>
    </div>
  </div>
  <div class="settings-pane" id="paneSkills" hidden>
    <p class="settings-desc">특정 업무의 절차·양식·톤을 스킬로 등록하세요. 메시지에 발동 키워드가 들어간 대화에서만 그 스킬이 조커에게 전달됩니다. 메모리가 "아는 것"이라면 스킬은 "일하는 방법"입니다.</p>
    <div class="settings-fields" id="skillList"></div>
    <button class="skill-add" id="skillAdd">+ 스킬 추가</button>
  </div>
  <button class="settings-save" id="settingsSave">저장</button>
</aside>

<script src="vendor/three.min.js"></script>
<script src="vendor/gsap.min.js"></script>
<script src="js/particles.js"></script>
<script src="js/depts.js"></script>
<script src="js/voice.js"></script>
<script src="js/settings.js"></script>
<script src="js/skills.js"></script>
<script src="js/brain2d.js"></script>
<script src="js/brain3d.js"></script>
<script src="js/chat.js"></script>
<script src="js/reminders.js"></script>
<script src="js/main.js"></script>
</body>
</html>
